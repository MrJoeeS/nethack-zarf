name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  IMAGE: docker.io/mrjoees/nethack
  ZARF_VERSION: v0.79.0

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Release version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE }}:latest
          build-args: |
            NETHACK_REF=NetHack-5.0
          cache-from: type=gha
          cache-to: type=gha,mode=max

  zarf:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "Release version: ${VERSION}"

      - name: Update package manifests for release
        run: ./scripts/prepare-release.sh "${{ steps.version.outputs.version }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          platforms: ${{ matrix.platform }}
          tags: |
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}
          build-args: |
            NETHACK_REF=NetHack-5.0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Zarf
        uses: zarf-dev/setup-zarf@v1.0.1
        with:
          version: ${{ env.ZARF_VERSION }}

      - name: Create Zarf package
        run: zarf package create . --confirm

      - name: Upload Zarf package artifact
        uses: actions/upload-artifact@v4
        with:
          name: zarf-package-${{ matrix.arch }}
          path: zarf-package-nethack-${{ matrix.arch }}-*.tar.zst
          if-no-files-found: error

  release:
    needs: [docker, zarf]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Zarf packages
        uses: actions/download-artifact@v4
        with:
          pattern: zarf-package-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: zarf-package-nethack-*.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
