apiVersion: v1
kind: Service
metadata:
  name: {{ include "nethack.fullname" . }}
  labels:
    {{- include "nethack.labels" . | nindent 4 }}
    zarf.dev/connect-name: nethack
  annotations:
    zarf.dev/connect-description: "Play NetHack in your browser"
spec:
  selector:
    {{- include "nethack.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
