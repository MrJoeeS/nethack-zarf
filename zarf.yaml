# yaml-language-server: $schema=https://raw.githubusercontent.com/defenseunicorns/zarf/main/zarf.schema.json
kind: ZarfPackageConfig
metadata:
  name: nethack
  description: "NetHack roguelike built from upstream source and served in the browser"
  version: "1.0.0"
  annotations:
    dev.uds.title: NetHack
    dev.uds.tagline: "The classic roguelike adventure in your browser"
    dev.uds.categories: Games
    dev.uds.keywords: "nethack,roguelike,game,ttyd"

variables:
  - name: DOMAIN
    default: uds.dev

components:
  - name: nethack
    required: true
    description: "Deploy NetHack with UDS ingress at nethack.###ZARF_VAR_DOMAIN###"
    charts:
      - name: nethack
        version: 0.1.0
        namespace: nethack
        localPath: chart
        valuesFiles:
          - values/upstream-values.yaml
    images:
      - docker.io/mrjoees/nethack:1.0.4
